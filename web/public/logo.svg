<svg width="512" height="512" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --logo-black: #0A0A0A;
      --logo-white: #FFFFFF;
      --logo-neutral-700: #2B2B2B;
      --logo-neutral-300: #D9D9D9;
      --logo-bg: var(--logo-black);
      --logo-glyph: var(--logo-white);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --logo-bg: var(--logo-white);
        --logo-glyph: var(--logo-black);
      }
    }
  </style>
  <rect width="128" height="128" rx="28" fill="var(--logo-bg)" />
  <rect x="26" y="24" width="76" height="18" rx="9" fill="var(--logo-glyph)" opacity="0.96" />
  <rect x="84" y="33" width="18" height="30" rx="9" fill="var(--logo-glyph)" opacity="0.96" />
  <rect x="26" y="54" width="76" height="18" rx="9" fill="var(--logo-glyph)" opacity="0.96" />
  <rect x="26" y="63" width="18" height="30" rx="9" fill="var(--logo-glyph)" opacity="0.96" />
  <rect x="26" y="86" width="76" height="18" rx="9" fill="var(--logo-glyph)" opacity="0.96" />
  <circle cx="95" cy="24" r="9" fill="var(--logo-glyph)" />
  <circle cx="95" cy="24" r="3.5" fill="var(--logo-bg)" opacity="0.9" />
</svg>

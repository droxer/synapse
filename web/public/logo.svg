<svg width="512" height="512" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --logo-bg-start: #1B7EF2;
      --logo-bg-end: #3B82F6;
      --logo-glyph: #FAFAFA;
      --logo-node-start: #DBEAFE;
      --logo-node-end: #BFDBFE;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --logo-bg-start: #3B8EF5;
        --logo-bg-end: #60A5FA;
        --logo-glyph: #FAFAFA;
        --logo-node-start: #E0F2FE;
        --logo-node-end: #BAE6FD;
      }
    }
  </style>
  <defs>
    <linearGradient id="logo-bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color: var(--logo-bg-start)" />
      <stop offset="100%" style="stop-color: var(--logo-bg-end)" />
    </linearGradient>
    <linearGradient id="logo-accent" x1="32" y1="28" x2="96" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" style="stop-color: var(--logo-node-start)" />
      <stop offset="100%" style="stop-color: var(--logo-node-end)" />
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="28" fill="url(#logo-bg)" />
  <rect x="26" y="24" width="76" height="18" rx="9" fill="var(--logo-glyph)" opacity="0.95" />
  <rect x="84" y="33" width="18" height="30" rx="9" fill="var(--logo-glyph)" opacity="0.95" />
  <rect x="26" y="54" width="76" height="18" rx="9" fill="var(--logo-glyph)" opacity="0.95" />
  <rect x="26" y="63" width="18" height="30" rx="9" fill="var(--logo-glyph)" opacity="0.95" />
  <rect x="26" y="86" width="76" height="18" rx="9" fill="var(--logo-glyph)" opacity="0.95" />
  <circle cx="95" cy="24" r="9" fill="url(#logo-accent)" />
  <circle cx="95" cy="24" r="3.5" fill="var(--logo-glyph)" opacity="0.9" />
</svg>

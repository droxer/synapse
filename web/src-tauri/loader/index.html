<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 24px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { color: #888; font-size: 14px; }
    .error {
      color: #ef4444;
      display: none;
      font-size: 14px;
      line-height: 1.5;
      max-width: 420px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Starting Synapse...</div>
  <div class="error" id="error"></div>

  <script>
    const MAX_ATTEMPTS = 60;
    let attempts = 0;
    let frontendUrl = 'http://localhost:3000';
    let tauriInvoke = null;

    function showError(message) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'block';
      errorEl.textContent = message;
    }

    async function loadTauriApi() {
      if (!window.__TAURI_INTERNALS__) return;
      if (window.__TAURI__?.core?.invoke) {
        tauriInvoke = window.__TAURI__.core.invoke;
        return;
      }
      if (window.__TAURI_INTERNALS__?.invoke) {
        tauriInvoke = window.__TAURI_INTERNALS__.invoke;
      }
    }

    async function getBootstrapInfo() {
      if (!tauriInvoke) {
        return { frontendUrl, bootError: null, ready: false };
      }

      return tauriInvoke('get_bootstrap_info');
    }

    async function resolveFrontendUrl() {
      try {
        await loadTauriApi();
        const bootstrap = await getBootstrapInfo();
        if (bootstrap.frontendUrl) {
          frontendUrl = bootstrap.frontendUrl;
        }
      } catch {
        // Keep localhost default for dev fallback
      }
    }

    async function probeFrontendHealth() {
      const response = await fetch(
        frontendUrl.replace(/\/$/, '') + '/api/desktop/health',
        { cache: 'no-store' }
      );

      if (!response.ok) {
        throw new Error('frontend health endpoint is not ready');
      }

      const payload = await response.json();
      if (payload?.status !== 'healthy' || payload?.service !== 'synapse-web') {
        throw new Error('configured frontend is not a Synapse web app');
      }
    }

    async function checkReady() {
      attempts++;
      const statusEl = document.getElementById('status');

      try {
        const bootstrap = await getBootstrapInfo();
        if (bootstrap.bootError) {
          showError(bootstrap.bootError);
          return;
        }

        if (bootstrap.frontendUrl) {
          frontendUrl = bootstrap.frontendUrl;
        }

        statusEl.textContent = bootstrap.ready
          ? 'Connecting to Synapse...'
          : 'Preparing Synapse services...';

        if (bootstrap.ready) {
          await probeFrontendHealth();
          window.location.href = frontendUrl.replace(/\/$/, '') + '/?desktop=1';
          return;
        }
      } catch {
        // Keep polling until the bootstrap task either succeeds or returns an explicit error.
      }

      if (attempts >= MAX_ATTEMPTS) {
        showError(
          'Could not connect to Synapse. In release builds, set SYNAPSE_FRONTEND_URL and SYNAPSE_BACKEND_URL to healthy Synapse services. In dev, ensure the local frontend and backend can start.'
        );
        return;
      }

      setTimeout(checkReady, 1000);
    }

    resolveFrontendUrl().then(checkReady);
  </script>
</body>
</html>

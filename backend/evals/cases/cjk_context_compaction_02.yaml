id: cjk_context_compaction_02
name: CJK Task Log Continuation Without Tool Repetition
description: >
  Agent reads a CJK task log and should continue execution without
  re-running shell steps that were already completed.
user_message: "阅读以下中文任务日志并继续执行，不要重复已经完成的 shell 步骤。"
grading_mode: programmatic
tags:
  - cjk
  - compaction
  - regression
max_iterations: 15

criteria:
  - name: shell_not_repeated
    type: tool_not_repeated
    value: shell_exec
    weight: 3.0
  - name: output_mentions_continuation
    type: output_contains
    value: "继续"
    weight: 1.0
  - name: no_errors_occurred
    type: no_errors
    weight: 1.0
  - name: completed_within_limit
    type: max_iterations
    value: 10
    weight: 1.0

mock_responses:
  - text: "我已阅读任务日志。前面的 shell 步骤已完成（安装依赖和编译）。我将继续执行下一个未完成的步骤：运行测试。"
    tool_calls:
      - id: tc_shell_cjk_1
        name: shell_exec
        input:
          command: "uv run pytest tests/"
    stop_reason: tool_use
    usage:
      input_tokens: 400
      output_tokens: 120
  - text: "测试全部通过。继续执行最后的部署步骤，无需重复之前已完成的 shell 操作。"
    tool_calls: []
    stop_reason: end_turn
    usage:
      input_tokens: 500
      output_tokens: 100
